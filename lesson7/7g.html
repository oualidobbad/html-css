<!DOCTYPE html>
<html lang="en">
<head>
	<title>Document</title>
	<style>
		.profile-cat{
			margin-top: 20px;
			width: 70px;
			height: 70px;
			vertical-align: middle;
			object-fit: cover;
			border-radius: 70px;
		}
		input{
			margin-top: 20px;
			vertical-align: middle;
			width: 300px;
			font-size: 18px;
			padding-left: 10px;
			padding-right: 10px;
			padding-top: 5px;
			padding-bottom: 5px;
			border: none;
		}
		button{
		margin-top: 20px;
		vertical-align: middle;
		background-color: rgb(2, 158, 255);
		color: white;
		border: none;
		height: 36px;
		width: 74px;
		border-radius: 18px;
		font-weight: bold;
		font-size: 15px;
		cursor: pointer;
		transition: box-shadow 0.15s;
		}
	</style>
</head>
<body>
	<img class="profile-cat" src="cat.jpg">
	<input type="text" placeholder="What's happening?">
	<button>Tweet</button>
</body>
</html>
