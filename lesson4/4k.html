<style>
    button{
        border: none;
        background-color: green;
        color: white;
        padding-left: 15px; 
        /* in margin i give 10 px but in pading i give padding 10px and remove it in margin  */
        padding-right: 15px;
        padding-top: 5px;
        padding-bottom: 5px;
        margin-left: 10px;
        margin-right: 10px;
        font-size: 18px;
        cursor: pointer;
        transition: padding 0.2s, margin 0.2s;
    }
    button:hover{
        padding-left: 25px;
        padding-right: 25px;
        margin-right: 0;
        margin-left: 0;
    }
</style>
<button>One</button>
<button>Two</button>
<button>Three</button>
